name: Delete branch after PR merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branch = pr && pr.head && pr.head.ref;
            const protectedBranches = ['main', 'master', 'develop'];
            if (!branch) {
              core.info('No head branch found, skipping deletion.');
            } else if (protectedBranches.includes(branch)) {
              core.info(`Skipping deletion of protected branch ${branch}`);
            } else {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`,
                });
                core.info(`Deleted branch ${branch}`);
              } catch (err) {
                core.info(`Failed to delete branch ${branch}: ${err.message}`);
              }
            }
