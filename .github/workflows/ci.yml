name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/specs_ci?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: specs_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix app

      - name: Generate Prisma client
        run: npm --prefix app run prisma:generate

      - name: Sync database schema for tests
        run: cd app && npx prisma db push --skip-generate

      - name: Lint
        run: npm --prefix app run lint

      - name: Build
        run: npm --prefix app run build

      - name: Run unit tests
        run: npm --prefix app run test

      - name: Install Playwright browsers
        run: cd app && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm --prefix app run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            app/playwright-report
            app/test-results
          if-no-files-found: ignore
